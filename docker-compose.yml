version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: powerbank-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: powerbank
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - powerbank-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: powerbank-backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: powerbank
      DB_USER: root
      DB_PASS: root123
      JWT_SECRET: powerbank-secret-key-must-be-at-least-256-bits-long-for-hs256
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - powerbank-network

  frontend-user:
    build:
      context: ./frontend-user
      dockerfile: Dockerfile
    container_name: powerbank-frontend-user
    environment:
      TZ: Asia/Shanghai
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - powerbank-network

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: powerbank-frontend-admin
    environment:
      TZ: Asia/Shanghai
    ports:
      - "8082:80"
    depends_on:
      - backend
    networks:
      - powerbank-network

volumes:
  mysql-data:
    name: powerbank-mysql-data

networks:
  powerbank-network:
    name: powerbank-network
    driver: bridge
